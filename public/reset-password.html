<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Reset Password — Sclshi</title>
<style>
  body{font-family:sans-serif;background:#0a0a0f;color:#eeeef5;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;}
  .card{background:#111118;border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:40px;text-align:center;max-width:380px;}
  .brand{font-size:26px;font-weight:700;margin-bottom:4px;}
  .brand span{color:#7c6af7;}
  .spinner{width:40px;height:40px;border:3px solid rgba(124,106,247,0.2);border-top-color:#7c6af7;border-radius:50%;animation:spin 0.8s linear infinite;margin:24px auto;}
  @keyframes spin{to{transform:rotate(360deg)}}
  p{color:#8888a8;font-size:14px;margin-top:12px;}
</style>
</head>
<body>
<div class="card">
  <div class="brand">Scl<span>shi</span></div>
  <div class="spinner"></div>
  <p>Loading reset form…</p>
</div>
<script>
  const token = new URLSearchParams(window.location.search).get('token');
  if(token){
    window.location.href = '/?reset=' + encodeURIComponent(token);
  } else {
    document.querySelector('p').textContent = 'Invalid link. Please request a new password reset.';
    document.querySelector('.spinner').style.display='none';
  }
</script>
</body>
</html>
